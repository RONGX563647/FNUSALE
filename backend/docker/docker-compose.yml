# 校园二手交易平台 - 基础设施 Docker Compose 配置
# 适用于开发环境，单节点部署
# 技术栈：MySQL 8.0 + Redis 7.0 + Elasticsearch 8.0 + MinIO + Nacos 2.3.0 + Sentinel 1.8.6 + RocketMQ 5.1.0 + Prometheus + Grafana

services:
  # ==================== 数据存储层 ====================

  # MySQL 8.0 - 主数据库
  # 用途：存储用户、商品、订单等核心业务数据
  mysql:
    image: mysql:8.0
    container_name: fnusale-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fnusale}
      MYSQL_USER: ${MYSQL_USER:-fnusale}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fnusale123456}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=500
      - --innodb_buffer_pool_size=256M
      - --query_cache_size=0
      - --query_cache_type=0
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - fnusale-network

  # Redis 7.0 - 缓存/秒杀库存/IM会话
  # 用途：缓存热点数据、秒杀库存预扣、IM在线用户状态、排行榜、签到记录
  redis:
    image: redis:7.0-alpine
    container_name: fnusale-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-redis123456}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - fnusale-network

  # Elasticsearch 8.0 - 商品搜索
  # 用途：商品全文检索、关键词搜索、多维度筛选
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.0.0
    container_name: fnusale-elasticsearch
    restart: unless-stopped
    ports:
      - "${ES_PORT:-9200}:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=fnusale-es
      - node.name=fnusale-es-node1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - fnusale-network

  # MinIO - 对象存储（OSS替代）
  # 用途：存储商品图片、用户头像、认证证件照片等文件
  minio:
    image: minio/minio:latest
    container_name: fnusale-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minio123456}
      MINIO_BROWSER: "on"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - fnusale-network

  # ==================== 微服务治理层 ====================

  # Nacos 2.3.0 - 注册/配置中心 (ARM兼容镜像)
  # 用途：微服务注册发现、配置中心、服务治理
  nacos:
    image: haoyu6/nacos-server-arm64:v2.2.3
    container_name: fnusale-nacos
    restart: unless-stopped
    ports:
      - "${NACOS_PORT:-8848}:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: ${MYSQL_DATABASE:-fnusale}
      MYSQL_SERVICE_USER: ${MYSQL_USER:-fnusale}
      MYSQL_SERVICE_PASSWORD: ${MYSQL_PASSWORD:-fnusale123456}
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-SecretKey012345678901234567890123456789012345678901234567890123456789}
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: security
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    volumes:
      - nacos_data:/home/nacos/logs
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - fnusale-network

  # Sentinel Dashboard 1.8.6 - 限流/熔断控制台
  # 用途：秒杀接口限流、服务熔断降级、实时监控
  sentinel:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: fnusale-sentinel
    restart: unless-stopped
    ports:
      - "${SENTINEL_PORT:-8858}:8858"
    environment:
      - SENTINEL_DASHBOARD_SERVER=localhost:8858
      - SENTINEL_SERVER_UNAME=${SENTINEL_USER:-sentinel}
      - SENTINEL_SERVER_PASSWORD=${SENTINEL_PASSWORD:-sentinel123456}
      - JAVA_OPTS=-Dserver.port=8858 -Dcsp.sentinel.dashboard.server=localhost:8858 -Dproject.name=sentinel-dashboard
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - fnusale-network

  # ==================== 消息队列 ====================

  # RocketMQ NameServer
  # 用途：消息队列注册中心，Broker注册与发现
  rocketmq-nameserver:
    image: apache/rocketmq:5.1.0
    container_name: fnusale-rocketmq-nameserver
    restart: unless-stopped
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT: "-Duser.home=/home/rocketmq"
    command: ["sh", "mqnamesrv"]
    volumes:
      - rocketmq_nameserver_logs:/home/rocketmq/logs
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - fnusale-network

  # RocketMQ Broker
  # 用途：消息存储与转发，支持秒杀削峰、IM消息异步推送、订单异步处理
  rocketmq-broker:
    image: apache/rocketmq:5.1.0
    container_name: fnusale-rocketmq-broker
    restart: unless-stopped
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      NAMESRV_ADDR: "rocketmq-nameserver:9876"
      JAVA_OPT_EXT: "-Duser.home=/home/rocketmq -server -Xms256m -Xmx512m"
      JAVA_OPT: "-Duser.home=/home/rocketmq"
    command: ["sh", "mqbroker", "-n", "rocketmq-nameserver:9876"]
    volumes:
      - rocketmq_broker_logs:/home/rocketmq/logs
      - rocketmq_broker_store:/home/rocketmq/store
    depends_on:
      - rocketmq-nameserver
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - fnusale-network

  # RocketMQ Dashboard - 消息队列管理控制台
  # 用途：可视化管理和监控RocketMQ，查看消息、Topic、消费者组等
  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: fnusale-rocketmq-dashboard
    restart: unless-stopped
    ports:
      - "${ROCKETMQ_DASHBOARD_PORT:-8180}:8080"
    environment:
      - JAVA_OPTS=-Drocketmq.namesrv.addr=rocketmq-nameserver:9876
    depends_on:
      - rocketmq-nameserver
      - rocketmq-broker
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - fnusale-network

  # ==================== 监控层 ====================

  # Logstash 8.0.0 - 日志收集与处理
  # 用途：收集微服务日志，处理后写入 Elasticsearch
  logstash:
    image: docker.elastic.co/logstash/logstash:8.0.0
    container_name: fnusale-logstash
    restart: unless-stopped
    ports:
      - "${LOGSTASH_PORT:-4560}:4560"
      - "5044:5044"
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - logstash_data:/usr/share/logstash/data
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9600/_node/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - fnusale-network

  # Kibana 8.0.0 - 日志可视化
  # 用途：可视化展示日志数据，日志搜索与分析
  kibana:
    image: docker.elastic.co/kibana/kibana:8.0.0
    container_name: fnusale-kibana
    restart: unless-stopped
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      I18N_LOCALE: "zh-CN"
      SERVER_NAME: "fnusale-kibana"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - fnusale-network

  # Prometheus - 监控数据采集
  # 用途：采集微服务指标数据，监控服务健康状态、秒杀QPS、缓存命中率等
  prometheus:
    image: prom/prometheus:latest
    container_name: fnusale-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - alertmanager
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - fnusale-network

  # Alertmanager - 告警通知
  # 用途：接收 Prometheus 告警，发送通知（邮件、Webhook等）
  alertmanager:
    image: prom/alertmanager:latest
    container_name: fnusale-alertmanager
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - fnusale-network

  # Grafana - 监控可视化
  # 用途：可视化展示监控数据，配置告警规则
  grafana:
    image: grafana/grafana:latest
    container_name: fnusale-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana123456}
      GF_INSTALL_PLUGINS: ""
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - fnusale-network

  # ==================== 监控 Exporters ====================

  # Redis Exporter - Redis 指标采集
  # 用途：采集 Redis 性能指标、内存使用、连接数等
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: fnusale-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M
    networks:
      - fnusale-network

  # MySQL Exporter - MySQL 指标采集
  # 用途：采集 MySQL 性能指标、连接数、慢查询等
  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: fnusale-mysql-exporter
    restart: unless-stopped
    ports:
      - "9104:9104"
    environment:
      DATA_SOURCE_NAME: "${MYSQL_USER:-fnusale}:${MYSQL_PASSWORD:-fnusale123456}@(mysql:3306)/"
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M
    networks:
      - fnusale-network

  # RocketMQ Exporter - RocketMQ 指标采集
  # 用途：采集 RocketMQ 消息堆积、TPS、Broker 状态等
  rocketmq-exporter:
    image: styletang/rocketmq-exporter:latest
    container_name: fnusale-rocketmq-exporter
    restart: unless-stopped
    ports:
      - "5557:5557"
    environment:
      rocketmq.config.namesrvAddr: "rocketmq-nameserver:9876"
    depends_on:
      - rocketmq-nameserver
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M
    networks:
      - fnusale-network

  # Elasticsearch Exporter - ES 指标采集
  # 用途：采集 Elasticsearch 集群状态、索引、搜索性能等
  elasticsearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:latest
    container_name: fnusale-elasticsearch-exporter
    restart: unless-stopped
    ports:
      - "9114:9114"
    command:
      - '--es.uri=http://elasticsearch:9200'
    depends_on:
      - elasticsearch
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M
    networks:
      - fnusale-network

# ==================== 网络配置 ====================
networks:
  fnusale-network:
    driver: bridge
    name: fnusale-network

# ==================== 数据卷配置 ====================
# 数据持久化配置，所有数据存储在Docker命名卷中
volumes:
  # MySQL数据卷
  mysql_data:
    name: fnusale-mysql-data
  # Redis数据卷
  redis_data:
    name: fnusale-redis-data
  # Elasticsearch数据卷
  es_data:
    name: fnusale-es-data
  # MinIO对象存储数据卷
  minio_data:
    name: fnusale-minio-data
  # Nacos日志数据卷
  nacos_data:
    name: fnusale-nacos-data
  # RocketMQ NameServer日志
  rocketmq_nameserver_logs:
    name: fnusale-rocketmq-ns-logs
  # RocketMQ Broker日志
  rocketmq_broker_logs:
    name: fnusale-rocketmq-broker-logs
  # RocketMQ Broker存储
  rocketmq_broker_store:
    name: fnusale-rocketmq-broker-store
  # Prometheus监控数据
  prometheus_data:
    name: fnusale-prometheus-data
  # Grafana仪表板配置
  grafana_data:
    name: fnusale-grafana-data
  # Logstash数据卷
  logstash_data:
    name: fnusale-logstash-data
  # Alertmanager数据卷
  alertmanager_data:
    name: fnusale-alertmanager-data