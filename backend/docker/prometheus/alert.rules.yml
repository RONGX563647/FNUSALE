# 告警规则配置
# 校园二手交易平台 - Prometheus Alert Rules

groups:
  # ==================== 服务健康告警 ====================
  - name: service_health
    rules:
      # 服务实例下线告警
      - alert: ServiceInstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "服务实例 {{ $labels.instance }} 已下线"
          description: "服务 {{ $labels.job }} 的实例 {{ $labels.instance }} 已超过 1 分钟无法访问。"

      # 服务健康检查失败
      - alert: ServiceHealthCheckFailed
        expr: spring_boot_health_status != 1
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "服务 {{ $labels.application }} 健康检查失败"
          description: "服务 {{ $labels.application }} 的健康状态异常，请检查服务状态。"

  # ==================== JVM 监控告警 ====================
  - name: jvm_alerts
    rules:
      # JVM 堆内存使用率过高
      - alert: JVMMemoryUsageHigh
        expr: (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "服务 {{ $labels.application }} JVM 堆内存使用率过高"
          description: "服务 {{ $labels.application }} 的 JVM 堆内存使用率已超过 85%，当前值: {{ $value | printf \"%.2f\" }}%"

      # JVM 堆内存使用率严重
      - alert: JVMMemoryUsageCritical
        expr: (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) * 100 > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "服务 {{ $labels.application }} JVM 堆内存使用率严重"
          description: "服务 {{ $labels.application }} 的 JVM 堆内存使用率已超过 95%，当前值: {{ $value | printf \"%.2f\" }}%，可能导致 OOM"

      # GC 时间过长
      - alert: JVMGCTimeTooLong
        expr: rate(jvm_gc_pause_seconds_sum[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "服务 {{ $labels.application }} GC 时间过长"
          description: "服务 {{ $labels.application }} 在过去 5 分钟内 GC 平均时间超过 0.5 秒/秒，可能存在内存问题。"

  # ==================== Redis 监控告警 ====================
  - name: redis_alerts
    rules:
      # Redis 内存使用率过高
      - alert: RedisMemoryUsageHigh
        expr: (redis_memory_used_bytes / redis_memory_max_bytes) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis 内存使用率过高"
          description: "Redis 内存使用率已超过 80%，当前值: {{ $value | printf \"%.2f\" }}%"

      # Redis 连接数过多
      - alert: RedisTooManyConnections
        expr: redis_connected_clients > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis 连接数过多"
          description: "Redis 当前连接数 {{ $value }} 超过 100，请检查连接池配置。"

      # Redis 实例不可用
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis 实例不可用"
          description: "Redis 实例已超过 1 分钟无法访问，请立即检查。"

  # ==================== MySQL 监控告警 ====================
  - name: mysql_alerts
    rules:
      # MySQL 连接数过多
      - alert: MySQLTooManyConnections
        expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MySQL 连接数过多"
          description: "MySQL 连接数使用率已超过 80%，当前值: {{ $value | printf \"%.2f\" }}%"

      # MySQL 慢查询过多
      - alert: MySQLSlowQueries
        expr: rate(mysql_global_status_slow_queries[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MySQL 慢查询过多"
          description: "MySQL 在过去 5 分钟内慢查询率超过 10 次/秒，当前值: {{ $value | printf \"%.2f\" }}/秒"

      # MySQL 实例不可用
      - alert: MySQLDown
        expr: mysql_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MySQL 实例不可用"
          description: "MySQL 实例已超过 1 分钟无法访问，请立即检查。"

  # ==================== RocketMQ 监控告警 ====================
  - name: rocketmq_alerts
    rules:
      # 消息堆积告警
      - alert: RocketMQMessageBacklog
        expr: rocketmq_message_backlog > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RocketMQ 消息堆积"
          description: "RocketMQ 消息堆积数量超过 10000，当前值: {{ $value }}，请检查消费者状态。"

      # Broker 不可用
      - alert: RocketMQBrokerDown
        expr: rocketmq_broker_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "RocketMQ Broker 不可用"
          description: "RocketMQ Broker 已超过 1 分钟无法访问，请立即检查。"

  # ==================== Elasticsearch 监控告警 ====================
  - name: elasticsearch_alerts
    rules:
      # 集群状态异常
      - alert: ElasticsearchClusterHealthRed
        expr: elasticsearch_cluster_health_status{color="red"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Elasticsearch 集群状态异常"
          description: "Elasticsearch 集群状态为 RED，部分分片不可用，请立即检查。"

      # 集群状态警告
      - alert: ElasticsearchClusterHealthYellow
        expr: elasticsearch_cluster_health_status{color="yellow"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elasticsearch 集群状态警告"
          description: "Elasticsearch 集群状态为 YELLOW，部分副本分片未分配。"

      # JVM 堆内存使用率高
      - alert: ElasticsearchJVMMemoryHigh
        expr: elasticsearch_jvm_memory_used_bytes{area="heap"} / elasticsearch_jvm_memory_max_bytes{area="heap"} * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elasticsearch JVM 堆内存使用率过高"
          description: "Elasticsearch 节点 {{ $labels.instance }} JVM 堆内存使用率已超过 85%。"

  # ==================== 系统资源告警 ====================
  - name: system_alerts
    rules:
      # CPU 使用率过高
      - alert: CPUUsageHigh
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU 使用率过高"
          description: "实例 {{ $labels.instance }} CPU 使用率已超过 80%，当前值: {{ $value | printf \"%.2f\" }}%"

      # 磁盘使用率过高
      - alert: DiskUsageHigh
        expr: (node_filesystem_size_bytes - node_filesystem_avail_bytes) / node_filesystem_size_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "磁盘使用率过高"
          description: "实例 {{ $labels.instance }} 磁盘 {{ $labels.mountpoint }} 使用率已超过 85%。"