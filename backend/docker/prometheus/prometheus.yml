# Prometheus 配置文件
# 校园二手交易平台 - 完整监控配置

global:
  scrape_interval: 15s      # 默认抓取间隔
  evaluation_interval: 15s  # 规则评估间隔
  external_labels:
    monitor: 'fnusale-monitor'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# 告警规则文件
rule_files:
  - /etc/prometheus/alert.rules.yml

# 抓取配置
scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # ==================== 微服务监控 ====================
  # Spring Boot 应用监控
  - job_name: 'spring-boot-apps'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'host.docker.internal:8080'   # gateway
          - 'host.docker.internal:8101'   # user
          - 'host.docker.internal:8102'   # product
          - 'host.docker.internal:8103'   # im
          - 'host.docker.internal:8104'   # ai-guide
          - 'host.docker.internal:8105'   # marketing
          - 'host.docker.internal:8106'   # trade
          - 'host.docker.internal:8107'   # admin
        labels:
          env: 'development'
    relabel_configs:
      - source_labels: [__address__]
        regex: 'host.docker.internal:(.*)'
        replacement: '${1}'
        target_label: port
      - source_labels: [__address__]
        regex: 'host.docker.internal:(.*)'
        replacement: 'fnusale-${1}'
        target_label: service

  # ==================== 基础设施监控 ====================
  # Nacos 监控
  - job_name: 'nacos'
    metrics_path: '/nacos/actuator/prometheus'
    static_configs:
      - targets: ['nacos:8848']
        labels:
          instance: 'nacos'

  # Sentinel Dashboard 监控
  - job_name: 'sentinel'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['sentinel:8858']
        labels:
          instance: 'sentinel'

  # Redis 监控
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          instance: 'redis'

  # MySQL 监控
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']
        labels:
          instance: 'mysql'

  # RocketMQ 监控
  - job_name: 'rocketmq'
    static_configs:
      - targets: ['rocketmq-exporter:5557']
        labels:
          instance: 'rocketmq'

  # Elasticsearch 监控
  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch-exporter:9114']
        labels:
          instance: 'elasticsearch'

  # MinIO 监控 (MinIO 原生支持 Prometheus 指标)
  - job_name: 'minio'
    metrics_path: '/minio/v2/metrics/cluster'
    scheme: http
    static_configs:
      - targets: ['minio:9000']
        labels:
          instance: 'minio'