# 校园二手交易平台 - 精简版中间件部署配置
# 服务：MySQL + Redis + Nacos + Sentinel + RocketMQ

services:
  # MySQL 8.0
  mysql:
    image: mysql:8.0
    container_name: fnusale-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: fnusale
      MYSQL_USER: fnusale
      MYSQL_PASSWORD: fnusale123456
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=200
      - --innodb_buffer_pool_size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - fnusale-network

  # Redis 7.0 Alpine
  redis:
    image: redis:7.0-alpine
    container_name: fnusale-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass redis123456
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123456", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - fnusale-network

  # Nacos 2.2.3 - 注册/配置中心
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: fnusale-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: SecretKey012345678901234567890123456789012345678901234567890123456789
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: security
      JVM_XMS: 128m
      JVM_XMX: 256m
      JVM_XMN: 64m
    volumes:
      - nacos_data:/home/nacos/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - fnusale-network

  # Sentinel Dashboard - 限流/熔断控制台
  sentinel:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: fnusale-sentinel
    restart: unless-stopped
    ports:
      - "8858:8858"
    environment:
      - JAVA_OPTS=-Xms64m -Xmx128m -Dserver.port=8858
    networks:
      - fnusale-network

  # RocketMQ NameServer
  rocketmq-nameserver:
    image: apache/rocketmq:4.9.7
    container_name: fnusale-rocketmq-nameserver
    restart: unless-stopped
    ports:
      - "9876:9876"
    command: ["sh", "mqnamesrv"]
    networks:
      - fnusale-network

  # RocketMQ Broker
  rocketmq-broker:
    image: apache/rocketmq:4.9.7
    container_name: fnusale-rocketmq-broker
    restart: unless-stopped
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      NAMESRV_ADDR: "rocketmq-nameserver:9876"
    command: ["sh", "mqbroker", "-n", "rocketmq-nameserver:9876"]
    volumes:
      - rocketmq_broker_store:/home/rocketmq/store
    depends_on:
      - rocketmq-nameserver
    networks:
      - fnusale-network

  # RocketMQ Dashboard
  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: fnusale-rocketmq-dashboard
    restart: unless-stopped
    ports:
      - "8180:8080"
    environment:
      - JAVA_OPTS=-Xmx128m -Drocketmq.namesrv.addr=rocketmq-nameserver:9876
    depends_on:
      - rocketmq-nameserver
    networks:
      - fnusale-network

networks:
  fnusale-network:
    driver: bridge
    name: fnusale-network

volumes:
  mysql_data:
    name: fnusale-mysql-data
  redis_data:
    name: fnusale-redis-data
  nacos_data:
    name: fnusale-nacos-data
  rocketmq_broker_store:
    name: fnusale-rocketmq-broker-store