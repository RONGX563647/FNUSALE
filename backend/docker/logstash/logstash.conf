# FNUSALE Logstash Pipeline Configuration
# 接收微服务日志并写入 Elasticsearch

input {
  # TCP input for logback logstash-logback-encoder
  tcp {
    port => 4560
    codec => json_lines {
      charset => "UTF-8"
    }
  }
}

filter {
  # 解析日志级别
  if [level] {
    mutate {
      add_field => { "log_level" => "%{level}" }
    }
  }

  # 添加服务名标签
  if [appname] {
    mutate {
      add_field => { "service" => "%{appname}" }
    }
  }

  # 处理时间戳
  date {
    match => [ "@timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS" ]
    target => "@timestamp"
    timezone => "Asia/Shanghai"
  }

  # 移除不必要的字段
  mutate {
    remove_field => [ "host", "port" ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # 按服务和日期分离索引
    index => "fnusale-logs-%{[service]}-%{+YYYY.MM.dd}"
  }

  # 开发环境调试输出（生产环境可移除）
  # stdout {
  #   codec => rubydebug
  # }
}