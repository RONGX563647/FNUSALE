# FNUSALE Logstash Pipeline Configuration
# 从Kafka消费微服务日志并写入 Elasticsearch
# 企业级优化：单一输入源(Kafka)、死信队列、唯一文档ID、ILM支持

input {
  kafka {
    bootstrap_servers => "kafka:9093"
    topics => ["fnusale-logs"]
    codec => json {
      charset => "UTF-8"
    }
    consumer_threads => 3
    group_id => "logstash-consumer"
    auto_offset_reset => "latest"
    enable_auto_commit => true
    max_poll_records => 1000
    session_timeout_ms => 30000
    max_poll_interval_ms => 300000
  }
}

filter {
  if [traceId] {
    mutate {
      add_field => { "trace_id" => "%{traceId}" }
    }
  }

  if [spanId] {
    mutate {
      add_field => { "span_id" => "%{spanId}" }
    }
  }

  if [serviceName] {
    mutate {
      add_field => { "service" => "%{serviceName}" }
    }
  } else if [appname] {
    mutate {
      add_field => { "service" => "%{appname}" }
    }
  }

  if [level] {
    mutate {
      add_field => { "log_level" => "%{level}" }
    }
  }

  if [logType] {
    mutate {
      add_field => { "log_type" => "%{logType}" }
    }
  }

  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS", "yyyy-MM-dd'T'HH:mm:ss" ]
      target => "@timestamp"
      timezone => "Asia/Shanghai"
    }
  } else {
    date {
      match => [ "@timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS" ]
      target => "@timestamp"
      timezone => "Asia/Shanghai"
    }
  }

  if [duration] {
    mutate {
      convert => { "duration" => "integer" }
    }
  }

  if [httpStatus] {
    mutate {
      convert => { "httpStatus" => "integer" }
    }
  }

  if [userId] {
    mutate {
      convert => { "userId" => "integer" }
    }
  }

  ruby {
    init => "@timestamp_unix = event.get('@timestamp').to_i"
    code => "
      event.set('document_id', "#{event.get('trace_id')}-#{event.get('span_id')}-#{@timestamp_unix}")
    "
  }

  mutate {
    remove_field => [ "host", "port" ]
  }

  if [stackTrace] and [stackTrace] != "" {
    mutate {
      add_tag => [ "exception" ]
    }
  }
}

output {
  if "_jsonparsefailure" in [tags] or "_rubyexception" in [tags] {
    file {
      path => "/var/log/logstash/dead-letter-%{+YYYY-MM-dd}.log"
      codec => line { format => "%{message}" }
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "fnusale-logs-%{[service]}-%{+YYYY.MM.dd}"
      document_id => "%{document_id}"
      ilm_enabled => true
      ilm_rollover_alias => "fnusale-logs"
      ilm_policy => "fnusale-logs-policy"
    }
  }

  if [log_level] == "ERROR" or [log_level] == "WARN" {
    file {
      path => "/var/log/logstash/error-logs-%{+YYYY-MM-dd}.log"
      codec => json
    }
  }
}
