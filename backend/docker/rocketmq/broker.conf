# RocketMQ Broker 配置文件 - RocketMQ 5.3.2

brokerClusterName = DefaultCluster
brokerName = broker-a
brokerId = 0
deleteWhen = 04
fileReservedTime = 48
brokerRole = ASYNC_MASTER
flushDiskType = ASYNC_FLUSH

# NameServer 地址
namesrvAddr = rocketmq-nameserver:9876

# Broker 地址配置 - 关键！
brokerIP1 = fnusale-rocketmq-broker
brokerIP2 = fnusale-rocketmq-broker

# 存储路径配置
storePathRootDir = /home/rocketmq/store
storePathCommitLog = /home/rocketmq/store/commitlog

# 延迟消息配置 - 修复 NPE
delayOffsetStorePath = /home/rocketmq/store/config/delayOffset.json

# 自动创建Topic
autoCreateTopicEnable = true
autoCreateSubscriptionGroup = true

# 性能配置
sendMessageThreadPoolNums = 16
pullMessageThreadPoolNums = 16