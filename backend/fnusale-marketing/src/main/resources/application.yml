server:
  port: 8105

spring:
  application:
    name: fnusale-marketing
  profiles:
    active: dev
  config:
    import: "optional:nacos"
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        enabled: ${NACOS_ENABLED:true}
      config:
        enabled: false
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
        port: ${SENTINEL_PORT:8719}
      eager: true
      datasource:
        flow:
          nacos:
            server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
            namespace: ${NACOS_NAMESPACE:}
            group-id: ${SENTINEL_GROUP:SENTINEL_GROUP}
            data-id: ${spring.application.name}-flow-rules
            rule-type: flow
        degrade:
          nacos:
            server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
            namespace: ${NACOS_NAMESPACE:}
            group-id: ${SENTINEL_GROUP:SENTINEL_GROUP}
            data-id: ${spring.application.name}-degrade-rules
            rule-type: degrade
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:fnusale}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:fnusale}
    password: ${MYSQL_PASSWORD:fnusale123456}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 20
      idle-timeout: 300000
      connection-timeout: 5000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
      pool-name: FnusaleMarketingHikariPool
      connection-test-query: SELECT 1
      validation-timeout: 3000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123456}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 64
          max-idle: 32
          min-idle: 16
          max-wait: 5000ms
          time-between-eviction-runs: 60000ms
        shutdown-timeout: 200ms
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      compression-type: lz4
      batch-size: 16384
      buffer-memory: 33554432
      linger-ms: 5
    consumer:
      group-id: fnusale-marketing
      auto-offset-reset: earliest
      enable-auto-commit: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: '营销服务'
      paths-to-match: '/**'
      packages-to-scan: com.fnusale.marketing.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.fnusale: info

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: marketing-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2

kafka:
  log:
    topic: fnusale-logs
    enabled: ${KAFKA_LOG_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
        descriptions: true

seckill:
  anti-fraud:
    ip-limit:
      threshold: 10
      window-seconds: 60
    captcha:
      fail-threshold: 3
      expire-minutes: 5
      length: 4
    user-fail:
      expire-hours: 1
