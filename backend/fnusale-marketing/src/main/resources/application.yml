server:
  port: 8105

spring:
  application:
    name: fnusale-marketing
  profiles:
    active: dev
  config:
    import: "optional:nacos"
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        enabled: ${NACOS_ENABLED:true}
      config:
        enabled: false
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
        port: ${SENTINEL_PORT:8719}
      eager: true
      datasource:
        flow:
          nacos:
            server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
            namespace: ${NACOS_NAMESPACE:}
            group-id: ${SENTINEL_GROUP:SENTINEL_GROUP}
            data-id: ${spring.application.name}-flow-rules
            rule-type: flow
        degrade:
          nacos:
            server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
            namespace: ${NACOS_NAMESPACE:}
            group-id: ${SENTINEL_GROUP:SENTINEL_GROUP}
            data-id: ${spring.application.name}-degrade-rules
            rule-type: degrade
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:fnusale}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:fnusale}
    password: ${MYSQL_PASSWORD:fnusale123456}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      pool-name: FnusaleMarketingHikariPool
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123456}
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3000ms

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# Knife4j 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: '营销服务'
      paths-to-match: '/**'
      packages-to-scan: com.fnusale.marketing.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.fnusale: info

# RocketMQ 配置
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: marketing-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2

# Sentinel 限流配置
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
        descriptions: true