server:
  port: 8080

spring:
  application:
    name: fnusale-gateway
  profiles:
    active: dev
  config:
    import: "optional:nacos"
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        enabled: ${NACOS_ENABLED:true}
      config:
        enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 用户服务
        - id: fnusale-user
          uri: lb://fnusale-user
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1

        # 商品服务
        - id: fnusale-product
          uri: lb://fnusale-product
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=1

        # IM服务
        - id: fnusale-im
          uri: lb://fnusale-im
          predicates:
            - Path=/api/im/**
          filters:
            - StripPrefix=1

        # AI导购服务
        - id: fnusale-ai-guide
          uri: lb://fnusale-ai-guide
          predicates:
            - Path=/api/ai-guide/**
          filters:
            - StripPrefix=1

        # 营销服务
        - id: fnusale-marketing
          uri: lb://fnusale-marketing
          predicates:
            - Path=/api/marketing/**
          filters:
            - StripPrefix=1

        # 交易服务
        - id: fnusale-trade
          uri: lb://fnusale-trade
          predicates:
            - Path=/api/trade/**
          filters:
            - StripPrefix=1

        # 管理服务
        - id: fnusale-admin
          uri: lb://fnusale-admin
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=1

        # 智能购物助手服务
        - id: fnusale-agent
          uri: lb://fnusale-agent
          predicates:
            - Path=/api/agent/**
          filters:
            - StripPrefix=1

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123456}
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3000ms
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
    consumer:
      group-id: fnusale-gateway
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

kafka:
  log:
    topic: fnusale-logs
    enabled: ${KAFKA_LOG_ENABLED:true}

# Knife4j 网关配置
knife4j:
  gateway:
    enabled: true
    strategy: discover
    discover:
      enabled: true
      version: openapi3

logging:
  level:
    com.fnusale: info
    org.springframework.cloud.gateway: warn

# Actuator 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true