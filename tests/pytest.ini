[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html
markers =
    smoke: 冒烟测试
    product: 商品相关测试
    category: 品类相关测试
    behavior: 用户行为测试
    auth: 需要认证的测试
    admin: 需要管理员权限的测试
filterwarnings =
    ignore::DeprecationWarning
